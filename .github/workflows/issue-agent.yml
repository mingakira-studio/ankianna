name: Issue Agent

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  analyze:
    runs-on: self-hosted
    if: startsWith(github.event.label.name, 'auto:')
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        if: github.event.label.name == 'auto:fix' || github.event.label.name == 'auto:feat'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Process issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          LABEL: ${{ github.event.label.name }}
          REPO: ${{ github.repository }}
        run: |
          FIX_LOG="$HOME/.cache/gh-fix-log.json"
          mkdir -p "$(dirname "$FIX_LOG")"
          [ -f "$FIX_LOG" ] || echo '[]' > "$FIX_LOG"
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          REPO_NAME=$(echo "$REPO" | cut -d/ -f2)

          log_result() {
            local action="$1" result="$2" detail="$3" pr_num="${4:-}"
            python3 -c "
          import json, sys
          with open('$FIX_LOG') as f: data = json.load(f)
          data.append({
              'issue_number': $ISSUE_NUMBER,
              'repo': '$REPO_NAME',
              'title': $(python3 -c "import json; print(json.dumps('$ISSUE_TITLE'))"),
              'timestamp': '$TIMESTAMP',
              'action': '$action',
              'result': '$result',
              'detail': $(python3 -c "import json; print(json.dumps('''$detail'''))"),
              'pr_number': ${pr_num:-0},
          })
          with open('$FIX_LOG', 'w') as f: json.dump(data[-50:], f, indent=2)
          "
          }

          if [ "$LABEL" = "auto:analyze" ]; then
            ANALYSIS=$(codex exec "Analyze this issue concisely.

          Issue: $ISSUE_TITLE
          Body: $ISSUE_BODY

          Provide:
          1. Root cause analysis (if bug)
          2. Affected files (list paths)
          3. Complexity (simple/medium/complex)
          4. Suggested approach
          5. Estimated effort" 2>&1 || echo "Analysis failed")

            gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body "## AI Analysis

          $ANALYSIS

          ---
          *Automated analysis by Codex*"

            log_result "analyze" "done" "$ANALYSIS"

          elif [ "$LABEL" = "auto:fix" ] || [ "$LABEL" = "auto:feat" ]; then
            BRANCH="auto/${LABEL#auto:}-issue-${ISSUE_NUMBER}"
            git fetch origin main
            git checkout -B "$BRANCH" origin/main

            CODEX_OUTPUT=$(codex exec "Fix this issue. Make minimal, focused changes. Run tests if possible.

          Issue: $ISSUE_TITLE
          Body: $ISSUE_BODY" 2>&1 || echo "Codex execution failed")

            if [ -n "$(git status --porcelain)" ]; then
              CHANGED_FILES=$(git diff --name-only HEAD)
              git add -A
              git commit -m "${LABEL#auto:}: $ISSUE_TITLE (closes #$ISSUE_NUMBER)"
              git push -u origin "$BRANCH"

              PR_URL=$(gh pr create --repo "$REPO" \
                --title "${LABEL#auto:}: $ISSUE_TITLE" \
                --base main \
                --head "$BRANCH" \
                --body "Closes #$ISSUE_NUMBER

          ## Changed Files
          $CHANGED_FILES

          ---
          *Auto-generated by Codex Issue Agent*" \
                --label "auto-merge" 2>&1)

              PR_NUM=$(echo "$PR_URL" | grep -oE '[0-9]+$' || echo "0")

              gh issue comment "$ISSUE_NUMBER" --repo "$REPO" \
                --body "PR #$PR_NUM created automatically. Will auto-merge after checks pass.

          **Changed files**: $CHANGED_FILES"

              log_result "${LABEL#auto:}" "pr_created" "Changed: $CHANGED_FILES" "$PR_NUM"
            else
              gh issue comment "$ISSUE_NUMBER" --repo "$REPO" \
                --body "Auto-fix attempted but no changes were made. Manual intervention needed."

              log_result "${LABEL#auto:}" "no_changes" "Codex ran but made no changes"

              # Escalate: label needs-human + assign + notify
              bash "$HOME/workspace/scripts/gtd_escalate_failure.sh" \
                "$REPO" "issue-agent" "$ISSUE_NUMBER" \
                "Codex made no changes for: $ISSUE_TITLE" || true
            fi
          fi
